name: Selenium Automation Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  selenium-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Java
        run: |
          java -version
          mvn -version

      - name: Build Project
        run: mvn clean compile

      - name: Execute Selenium Tests
        run: mvn test

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Report
          path: reports/