name: Selenium Automation Framework CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  selenium-tests:

    name: Execute Selenium Automation Suite
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Java & Maven
        run: |
          java -version
          mvn -version

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome
        run: chrome --version

      - name: Build Project
        run: mvn clean compile

      - name: Execute Selenium Tests
        run: mvn clean test

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Report
          path: reports/

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Surefire-Reports
          path: target/surefire-reports/

      - name: Publish Build Summary
        if: always()
        run: |
          echo "# Selenium Automation Framework" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Selenium WebDriver |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Java |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Runner | TestNG |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Tool | Maven |" >> $GITHUB_STEP_SUMMARY
          echo "| Reporting | Extent Reports |" >> $GITHUB_STEP_SUMMARY
          echo "| CI/CD | GitHub Actions |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Stages" >> $GITHUB_STEP_SUMMARY
          echo "- Checkout Repository" >> $GITHUB_STEP_SUMMARY
          echo "- Setup Java 21" >> $GITHUB_STEP_SUMMARY
          echo "- Install Google Chrome" >> $GITHUB_STEP_SUMMARY
          echo "- Build Project" >> $GITHUB_STEP_SUMMARY
          echo "- Execute Selenium Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Generate Extent Reports" >> $GITHUB_STEP_SUMMARY
          echo "- Upload Reports" >> $GITHUB_STEP_SUMMARY